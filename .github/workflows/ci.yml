name: CI — AWG Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run linter
        run: ruff check src/ tests/ || true

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --tb=short

      - name: Validate AWG 2.0 compliance
        run: pytest tests/unit/test_validator.py -v -k "awg20"

      - name: Security check — no unsafe random in crypto
        run: pytest tests/unit/test_csprng.py::TestCSPRNG::test_no_math_random_in_codebase -v
